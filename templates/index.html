<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CreditRisk AI • Prediction</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      max-width: 620px;
      width: 100%;
      margin: 1rem;
    }

    .hero {
      background: linear-gradient(135deg, #1e40af, #3b82f6);
      padding: 2.5rem 2rem;
      text-align: center;
      position: relative;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(to right, #60a5fa, #a5b4fc);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.2);
      color: white;
      padding: 6px 16px;
      border-radius: 9999px;
      font-size: 13px;
      font-weight: 600;
      backdrop-filter: blur(10px);
      margin-bottom: 12px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: white;
      margin-bottom: 8px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .sub {
      color: #dbeafe;
      font-size: 15.5px;
      max-width: 420px;
      margin: 0 auto;
    }

    .body {
      padding: 2rem;
    }

    .section-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-label::before {
      content: '';
      width: 24px;
      height: 2px;
      background: #64748b;
      border-radius: 999px;
    }

    .field label {
      font-size: 14px;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 6px;
      display: block;
    }

    .field input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(148, 163, 184, 0.3);
      border-radius: 12px;
      color: white;
      font-size: 15px;
      transition: all 0.3s ease;
    }

    .field input:focus {
      outline: none;
      border-color: #60a5fa;
      box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.2);
      background: rgba(255,255,255,0.1);
    }

    .hint {
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
    }

    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      font-weight: 700;
      font-size: 17px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 1.5rem;
      box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.4);
    }

    .result {
      margin: 1.5rem 2rem;
      padding: 20px;
      border-radius: 16px;
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      animation: popIn 0.5s ease;
    }

    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .good {
      background: #052e16;
      color: #4ade80;
      border: 1px solid #4ade80;
    }

    .bad {
      background: #450a0a;
      color: #f87171;
      border: 1px solid #f87171;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="hero">
      <div class="badge">
        <i class="fas fa-shield-alt"></i>
        AI POWERED
      </div>
      <h1>CreditRisk AI</h1>
      <p class="sub">Advanced Machine Learning Prediction System</p>
    </div>

    <div class="body">
      <form method="post">

        <div class="mb-8">
          <p class="section-label"><i class="fas fa-chart-line"></i> Financial Profile</p>
          <div class="grid grid-cols-2 gap-4">
            <div class="field">
              <label>Revolving Utilization</label>
              <input type="number" step="any" name="RevolvingUtilizationOfUnsecuredLines_trim" placeholder="0.35" required>
              <span class="hint">Unsecured lines (trimmed)</span>
            </div>
            <div class="field">
              <label>Monthly Income</label>
              <input type="number" step="any" name="MonthlyIncome_replaced" placeholder="5000" required>
              <span class="hint">Replaced value</span>
            </div>
            <div class="field">
              <label>Open Credit Lines</label>
              <input type="number" step="any" name="NumberOfOpenCreditLinesAndLoans" placeholder="8" required>
            </div>
            <div class="field">
              <label>Real Estate Loans</label>
              <input type="number" step="any" name="NumberRealEstateLoansOrLines" placeholder="2" required>
            </div>
          </div>
        </div>

        <div class="mb-8">
          <p class="section-label"><i class="fas fa-user"></i> Personal Details</p>
          <div class="grid grid-cols-2 gap-4">
            <div class="field">
              <label>Age</label>
              <input type="number" step="any" name="Age" placeholder="42" required>
            </div>
            <div class="field">
              <label>Dependents</label>
              <input type="number" step="any" name="NumberOfDependents_replaced_trim" placeholder="2" required>
              <span class="hint">Replaced & trimmed</span>
            </div>
            <div class="field">
              <label>Gender</label>
              <input type="number" name="Gender_Male" placeholder="1 = Male, 0 = Female" required>
            </div>
          </div>
        </div>

        <div class="mb-8">
          <p class="section-label"><i class="fas fa-home"></i> Lifestyle & Housing</p>
          <div class="grid grid-cols-3 gap-4">
            <div class="field">
              <label>Rented / Own</label>
              <input type="number" step="any" name="Rented_OwnHouse_con" placeholder="encoded" required>
            </div>
            <div class="field">
              <label>Occupation</label>
              <input type="number" step="any" name="Occupation_con" placeholder="encoded" required>
            </div>
            <div class="field">
              <label>Education</label>
              <input type="number" step="any" name="Education_con" placeholder="encoded" required>
            </div>
          </div>
        </div>

        <div class="mb-8">
          <p class="section-label"><i class="fas fa-map-marker-alt"></i> Region (0 or 1)</p>
          <div class="grid grid-cols-4 gap-3">
            <div class="field">
              <label class="text-center block">East</label>
              <input type="number" name="Region_East" placeholder="0/1" required>
            </div>
            <div class="field">
              <label class="text-center block">North</label>
              <input type="number" name="Region_North" placeholder="0/1" required>
            </div>
            <div class="field">
              <label class="text-center block">South</label>
              <input type="number" name="Region_South" placeholder="0/1" required>
            </div>
            <div class="field">
              <label class="text-center block">West</label>
              <input type="number" name="Region_West" placeholder="0/1" required>
            </div>
          </div>
        </div>

        <button type="submit" class="btn">
          <i class="fas fa-brain"></i>
          Predict Credit Risk
        </button>
      </form>
    </div>

    {% if prediction %}
    <div class="result {% if 'Good' in prediction %}good{% else %}bad{% endif %}">
      <i class="fas fa-{% if 'Good' in prediction %}check-circle{% else %}exclamation-triangle{% endif %} text-2xl mb-2"></i>
      <div>Prediction: {{ prediction }}</div>
    </div>
    {% endif %}

  </div>

</body>
</html>
